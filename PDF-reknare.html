<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF-Sidräknare 1.0</title>
    
    <script src="pdf.min.js"></script>
    <script>
        // Sökväg för att hitta workern i samma mapp
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'pdf.worker.min.js';
    </script>

    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f8fafc; color: #334155; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 900px; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h1 { color: #0f172a; margin-bottom: 10px; text-align: center; }
        .subtitle { color: #64748b; margin-bottom: 30px; text-align: center; }
        
        .drop-zone { 
            border: 2px dashed #cbd5e1; 
            border-radius: 8px; 
            padding: 50px 20px; 
            text-align: center; 
            cursor: pointer; 
            transition: all 0.3s;
            margin-bottom: 30px;
            background-color: #f8fafc;
        }
        .drop-zone:hover { border-color: #0ea5e9; background-color: #f0f9ff; }
        .drop-zone p { margin: 10px 0; font-weight: bold; color: #475569; }
        .drop-zone span { font-size: 0.9em; color: #94a3b8; }
        
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        .stat-card { background: #f1f5f9; padding: 20px; border-radius: 8px; text-align: center; border: 1px solid #e2e8f0; }
        .stat-value { font-size: 2em; font-weight: bold; color: #0ea5e9; display: block; }
        .stat-label { font-size: 0.8em; text-transform: uppercase; letter-spacing: 1px; color: #64748b; font-weight: 600; }
        
        .price-card { background: #0ea5e9; color: white; border: none; }
        .price-card .stat-value, .price-card .stat-label { color: white; }

        .file-list { margin-top: 20px; border-top: 1px solid #e2e8f0; }
        .file-item { 
            padding: 15px; 
            border-bottom: 1px solid #e2e8f0; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
        }
        .file-name { font-weight: 500; }
        .page-count { font-weight: bold; color: #0ea5e9; }
        .error { color: #ef4444; font-size: 0.9em; }
    </style>
</head>
<body>

    <div class="container">
        <h1>PDF-Sidräknare <span style="font-size: 0.4em; font-weight: 500; color: #94a3b8; vertical-align: super;">1.0</span></h1>
        <p class="subtitle">Lokal bearbetning - Prisberäkning inkluderad.</p>

        <div class="stats-grid">
            <div class="stat-card">
                <span id="totalFiles" class="stat-value">0</span>
                <span class="stat-label">Antal Filer</span>
            </div>
            <div class="stat-card">
                <span id="totalPages" class="stat-value">0</span>
                <span class="stat-label">Totalt Sidor</span>
            </div>
            <div class="stat-card price-card">
                <span id="totalPrice" class="stat-value">0 kr</span>
                <span class="stat-label">Beräknat Pris</span>
            </div>
        </div>

        <div id="dropZone" class="drop-zone">
            <p>Dra och släpp PDF-filer här</p>
            <span>eller klicka för att välja</span>
            <input type="file" id="fileInput" multiple accept=".pdf" style="display:none">
        </div>

        <button id="resetBtn" style="margin-top: 20px; padding: 12px 20px; background-color: #ef4444; color: white; border: none; border-radius: 6px; cursor: pointer; display: none; font-weight: bold; width: 100%; font-size: 16px;">
            Återställ / Rensa filer
        </button>

        <div id="fileList" class="file-list"></div>

        <div style="text-align: center; margin-top: 40px; font-size: 0.85em; color: #94a3b8; letter-spacing: 0.5px;">
            Skapad av Aldin Hamoui
        </div>
    </div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const fileList = document.getElementById('fileList');
        const totalFilesDisplay = document.getElementById('totalFiles');
        const totalPagesDisplay = document.getElementById('totalPages');
        const totalPriceDisplay = document.getElementById('totalPrice');
        const resetBtn = document.getElementById('resetBtn');

        let totalFiles = 0;
        let totalPages = 0;

        // Funktion för att beräkna priset
        function calculatePrice(pages) {
            if (pages < 10) return 0;
            if (pages === 10) return 50;
            return 50 + (pages - 10) * 2;
        }

        // Uppdaterar gränssnittet och priset
        function updateUI() {
            totalFilesDisplay.innerText = totalFiles;
            totalPagesDisplay.innerText = totalPages;
            
            const formatter = new Intl.NumberFormat('sv-SE', { style: 'currency', currency: 'SEK', maximumFractionDigits: 0 });
            totalPriceDisplay.innerText = formatter.format(calculatePrice(totalPages));

            resetBtn.style.display = totalFiles > 0 ? 'block' : 'none';
        }

        // Återställ appen
        resetBtn.addEventListener('click', () => {
            totalFiles = 0;
            totalPages = 0;
            fileList.innerHTML = '';
            fileInput.value = '';
            updateUI();
        });

        dropZone.addEventListener('click', () => fileInput.click());

        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.style.borderColor = '#0ea5e9';
            dropZone.style.backgroundColor = '#f0f9ff';
        });

        dropZone.addEventListener('dragleave', (e) => {
            e.preventDefault();
            dropZone.style.borderColor = '#cbd5e1';
            dropZone.style.backgroundColor = '#f8fafc';
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.style.borderColor = '#cbd5e1';
            dropZone.style.backgroundColor = '#f8fafc';
            handleFiles(e.dataTransfer.files);
        });

        fileInput.addEventListener('change', (e) => {
            handleFiles(e.target.files);
        });

        async function handleFiles(files) {
            for (let file of files) {
                if (file.type === 'application/pdf' || file.name.toLowerCase().endsWith('.pdf')) {
                    addFileToList(file);
                }
            }
            fileInput.value = '';
        }

        async function addFileToList(file) {
            const div = document.createElement('div');
            div.className = 'file-item';
            div.innerHTML = `
                <span class="file-name">${file.name}</span>
                <span class="page-count" style="color:#94a3b8;">Läser...</span>
            `;
            fileList.prepend(div);

            try {
                const arrayBuffer = await file.arrayBuffer();
                const pdf = await pdfjsLib.getDocument(arrayBuffer).promise;
                const pages = pdf.numPages;

                div.querySelector('.page-count').textContent = pages + " sidor";
                div.querySelector('.page-count').style.color = "#0ea5e9";
                
                totalFiles++;
                totalPages += pages;
                
                updateUI();

            } catch (error) {
                console.error(error);
                div.querySelector('.page-count').innerHTML = `<span class="error"><i class="fas fa-exclamation-circle"></i> Kunde inte läsa</span>`;
            }
        }
    </script>
</body>
</html>
